name: middleware-base-url package

on:
  pull_request:
    paths:
      - packages/core/**
      - .github/workflows/middleware-base-url.ci.yaml
      - .github/workflows/_template-package.ci.yaml
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/_template-package.ci.yaml
    with:
      package_path: "packages/middleware-base-url"
      package_name: "@qfetch/middleware-base-url"
